version: '3.9'

services:
  db:
    image: postgres:15
    container_name: fenix_db
    restart: always
    environment:
      POSTGRES_DB: fenix
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: fenix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: